name: Actionlint

on:
  workflow_call:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache actionlint binary
        id: cache-actionlint
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/actionlint
          key: actionlint-${{ runner.os }}

      - name: Install actionlint
        if: steps.cache-actionlint.outputs.cache-hit != 'true'
        run: |
          curl -sSL https://github.com/rhysd/actionlint/releases/latest/download/actionlint-linux-amd64.zip -o actionlint.zip
          unzip -d /usr/local/bin actionlint.zip
          chmod +x /usr/local/bin/actionlint

      - name: Run actionlint
        run: |
          actionlint